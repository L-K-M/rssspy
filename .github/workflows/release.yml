name: Release

on:
  push:
    tags:
      - 'v*'

# Needed to create the GitHub Release and upload the packaged artifact.
permissions:
  contents: write

jobs:
  release:
    name: Package & publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Build an unsigned .zip from the extension sources at the repo root.
      - name: Build extension
        run: npx --yes web-ext build --source-dir . --artifacts-dir web-ext-artifacts --overwrite-dest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: web-ext-artifacts/*.zip
