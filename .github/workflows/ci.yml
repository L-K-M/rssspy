name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel an in-progress run when a branch is pushed again.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Mozilla's web-ext lint validates the manifest and extension sources.
      # manifest.json lives at the repository root, so the source dir is ".".
      - name: web-ext lint
        run: npx --yes web-ext lint --source-dir .
