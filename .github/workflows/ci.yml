name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel an in-progress run when a branch is pushed again.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Mozilla's web-ext lint validates the manifest and packaged sources.
      # web-ext-config.cjs scopes it (and build/sign) to the shipped files.
      - name: Lint extension
        run: npm run lint
